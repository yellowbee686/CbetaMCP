version: '3.9'

services:
  cebta-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cebta-mcp-demo
    ports:
      - "${APP_PORT:-18765}:18765"
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=18765
      - APP_BASE_URL=http://localhost:18765
    restart: unless-stopped
